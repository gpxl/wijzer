name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Install shellcheck (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint scripts
        run: shellcheck scripts/*.sh scripts/lib/*.sh

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci || npm install

      - name: Run tests (scripts against real git repos)
        run: npm test
